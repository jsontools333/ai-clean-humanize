name = "humanizer"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

# Workers AI binding — this is what makes the free LLM tier work.
# After deploying, also add this in the Cloudflare dashboard under:
#   Pages project → Settings → Functions → Bindings → Add → Workers AI
#   Variable name: AI
[ai]
binding = "AI"
